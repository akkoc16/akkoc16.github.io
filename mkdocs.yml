site_name: Mehmet Enver Akkoç
site_description: Experiences and learnings in DevOps and Site Reliability Engineering
site_author: Mehmet Enver Akkoç
site_url: https://akkoc16.github.io/devops-blog/
repo_url: https://github.com/akkoc16
repo_name: akkoc16
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  social:
    - icon: fontawesome/brands/medium
      link: https://medium.com/@m.enver.akkoc
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/mehmetenverakkoc/
    - icon: fontawesome/brands/github
      link: https://github.com/akkoc16
    - icon: fontawesome/solid/envelope
      link: mailto:m.enver.akkoc@gmail.com

extra:
  social:
    - icon: fontawesome/brands/medium
      link: https://medium.com/@m.enver.akkoc
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/mehmetenverakkoc/
    - icon: fontawesome/brands/github
      link: https://github.com/akkoc16
    - icon: fontawesome/solid/envelope
      link: mailto:m.enver.akkoc@gmail.com
  analytics:
    provider: google
    property: G-7T35J3H6L0

extra_javascript:
  - javascripts/analytics.js
  - javascripts/cookie-banner.js
  - javascripts/sidebar-visibility.js

extra_css:
  - stylesheets/cookie-banner.css
  - stylesheets/custom.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes

nav:
  - Home: index.md
  - Blog:
    - Kubernetes:
      - Kubernetes Up & Running: kubernetes/kubernetes-up&running.md
      - Event Monitoring: kubernetes/kubernetes-event-monitoring.md
    - CI/CD:
      - Overview: cicd/index.md
      - Pipeline Optimization: cicd/pipeline-optimization.md
      - Best Practices: cicd/best-practices.md
    - Monitoring:
      - Overview: monitoring/index.md
      - Observability: monitoring/observability.md
      - Alerting: monitoring/alerting.md
    - Security:
      - Authentication: security/secure-software-development-authentication.md
      - Business Logic: security/secure-software-development-business-logic-flows.md
      - Code Injection: security/secure-software-development-code-injection.md
      - Trust No Input: security/secure-software-development-trust-no-input.md
      - SQL Injections: security/secure-software-development-sql-injections.md
    - All Posts:
      - Kubernetes Up & Running: kubernetes/kubernetes-up&running.md
      - Kubernetes Event Monitoring: kubernetes/kubernetes-event-monitoring.md
      - CI/CD Overview: cicd/index.md
      - Pipeline Optimization: cicd/pipeline-optimization.md
      - CI/CD Best Practices: cicd/best-practices.md
      - Monitoring Overview: monitoring/index.md
      - Observability: monitoring/observability.md
      - Alerting: monitoring/alerting.md
      - Authentication: security/secure-software-development-authentication.md
      - Business Logic: security/secure-software-development-business-logic-flows.md
      - Code Injection: security/secure-software-development-code-injection.md
      - Trust No Input: security/secure-software-development-trust-no-input.md
      - SQL Injections: security/secure-software-development-sql-injections.md
  - About: about.md
